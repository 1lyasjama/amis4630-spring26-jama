name: Deploy Frontend to Azure App Service

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: buckeye-frontend-jama
  NODE_VERSION: '20'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --run

      - name: Build (production)
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - name: Zip dist
        run: |
          cd dist
          zip -qr ../../app.zip .

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-zip
          path: app.zip

  deploy:
    name: Deploy to Azure App Service
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-zip

      - name: Deploy via Kudu ZipDeploy
        shell: bash
        env:
          PROFILE: ${{ secrets.AZURE_FRONTEND_PUBLISH_PROFILE }}
          APP_NAME: ${{ env.AZURE_WEBAPP_NAME }}
        run: |
          set -euo pipefail
          USER=$(python3 -c "
          import os, xml.etree.ElementTree as ET
          root = ET.fromstring(os.environ['PROFILE'])
          p = next(p for p in root.findall('publishProfile') if p.get('publishMethod')=='MSDeploy')
          print(p.get('userName'))")
          PASS=$(python3 -c "
          import os, xml.etree.ElementTree as ET
          root = ET.fromstring(os.environ['PROFILE'])
          p = next(p for p in root.findall('publishProfile') if p.get('publishMethod')=='MSDeploy')
          print(p.get('userPWD'))")
          echo "Deploying app.zip to $APP_NAME via Kudu ZipDeploy..."
          HTTP_CODE=$(curl -s -o /tmp/deploy.log -w "%{http_code}" \
            -X POST "https://${APP_NAME}.scm.azurewebsites.net/api/zipdeploy" \
            -u "$USER:$PASS" \
            -H "Content-Type: application/zip" \
            --data-binary "@app.zip")
          echo "HTTP $HTTP_CODE"
          cat /tmp/deploy.log || true
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Deploy failed (HTTP $HTTP_CODE)"
            exit 1
          fi
          echo "Deploy succeeded."
