name: CI - Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (.NET) build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore amis4630-spring26-jama.sln

      - name: Build (Release)
        run: dotnet build amis4630-spring26-jama.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test amis4630-spring26-jama.sln --configuration Release --no-build --verbosity normal

  frontend:
    name: Frontend (React) build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Unit / component tests
        run: npm test -- --run

      - name: Build (production)
        run: npm run build
        env:
          VITE_API_URL: https://buckeye-api-jama.azurewebsites.net
