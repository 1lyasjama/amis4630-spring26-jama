name: Deploy API to Azure

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'BuckeyeMarketplaceApi.Tests/**'
      - 'amis4630-spring26-jama.sln'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: buckeye-api-jama
  DOTNET_VERSION: '10.0.x'
  PROJECT_PATH: api/BuckeyeMarketplaceApi.csproj

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore amis4630-spring26-jama.sln

      - name: Build (Release)
        run: dotnet build amis4630-spring26-jama.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test amis4630-spring26-jama.sln --configuration Release --no-build --verbosity normal

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-build --output ./publish

      - name: Zip publish output
        run: |
          cd publish
          zip -qr ../app.zip .

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-zip
          path: app.zip

  deploy:
    name: Deploy to Azure App Service
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: api-zip

      - name: Deploy via Kudu ZipDeploy
        shell: bash
        env:
          PROFILE: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          APP_NAME: ${{ env.AZURE_WEBAPP_NAME }}
        run: |
          set -euo pipefail
          USER=$(python3 -c "
          import os, xml.etree.ElementTree as ET
          root = ET.fromstring(os.environ['PROFILE'])
          p = next(p for p in root.findall('publishProfile') if p.get('publishMethod')=='MSDeploy')
          print(p.get('userName'))")
          PASS=$(python3 -c "
          import os, xml.etree.ElementTree as ET
          root = ET.fromstring(os.environ['PROFILE'])
          p = next(p for p in root.findall('publishProfile') if p.get('publishMethod')=='MSDeploy')
          print(p.get('userPWD'))")
          echo "Deploying app.zip to $APP_NAME via Kudu ZipDeploy..."
          HTTP_CODE=$(curl -s -o /tmp/deploy.log -w "%{http_code}" \
            -X POST "https://${APP_NAME}.scm.azurewebsites.net/api/zipdeploy" \
            -u "$USER:$PASS" \
            -H "Content-Type: application/zip" \
            --data-binary "@app.zip")
          echo "HTTP $HTTP_CODE"
          cat /tmp/deploy.log || true
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Deploy failed (HTTP $HTTP_CODE)"
            exit 1
          fi
          echo "Deploy succeeded."
